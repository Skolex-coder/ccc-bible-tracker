  CCC Bible Tracker V3.0
  Character-Charged Christianity — 4-Phase, 65-Week Bible Reading Plan

  Credit to Adrian Park for designing and running the CCC course,
  and to Rebekah Park for design ideas and feedback.

  Written for Nathaniel Jutsum — V3.0 rebuilt May 2026.
  V1.5 Dec 2025 → V2.0 May 2026 → V3.0 May 2026

  "Lord, may this app help me to train my soul and aid me in reading your word every week.
  I pray that in the things I learn and the relationships I make, I will learn to honour
  your word and honour your will for me and my life."
-->
<!DOCTYPE html>
<html lang="en" data-theme="dark" data-palette="sage">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4a7c59">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<title>CCC Bible Tracker</title>
<style>
/* ═══════════════════════════════════════════════════════════
   PALETTE VARIABLES — 5 themes
   ═══════════════════════════════════════════════════════════ */
[data-palette="sage"]    { --p1:#4a7c59;--p2:#6aab79;--p3:#a8d5a2;--p1g:rgba(74,124,89,.3); }
[data-palette="slate"]   { --p1:#2563eb;--p2:#7c3aed;--p3:#06b6d4;--p1g:rgba(37,99,235,.3); }
[data-palette="amber"]   { --p1:#c2601a;--p2:#e8920c;--p3:#ef4444;--p1g:rgba(194,96,26,.3); }
[data-palette="dusk"]    { --p1:#6d28d9;--p2:#a855f7;--p3:#ec4899;--p1g:rgba(109,40,217,.3); }
[data-palette="crimson"] { --p1:#be123c;--p2:#f43f5e;--p3:#f97316;--p1g:rgba(190,18,60,.3); }

/* ── Dark theme (default) ── */
[data-theme="dark"] {
  --bg1:#0a0f1e; --bg2:#111827; --bg3:#1a2535; --bg4:#243040; --bg5:#2e3d50;
  --txt1:#f0f4ff; --txt2:#8fa8c0; --txt3:#4e6880;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --shadow:rgba(0,0,0,.6);
  --rread-bg:#0d2a1a; --rread-txt:#4ade80; --rread-bdr:#16a34a;
  --rdone-bg:#0a1f2d;
}
/* ── Light theme ── */
[data-theme="light"] {
  --bg1:#eef2f7; --bg2:#ffffff; --bg3:#f4f7fb; --bg4:#e4eaf2; --bg5:#d0dae6;
  --txt1:#0d1b2a; --txt2:#4a6275; --txt3:#8a9faf;
  --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.13);
  --shadow:rgba(0,0,0,.1);
  --rread-bg:#dcfce7; --rread-txt:#15803d; --rread-bdr:#86efac;
  --rdone-bg:#f0f4f8;
}

/* ═══════════════════════════════════════════════════════════
   RESET + BASE
   ═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg1);color:var(--txt1);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none}

/* ═══════════════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════════════ */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative}

/* ── Header ── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;
}
.hdr-brand{display:flex;align-items:center;gap:8px}
.hdr-icon{font-size:20px}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr-streak{
  font-size:12px;font-weight:700;color:var(--txt2);
  background:var(--bg3);border:1px solid var(--border2);
  padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;
}
.gear-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--txt2);font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.gear-btn:active{transform:scale(.9)}

/* ── Scrollable main ── */
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ── Tab panels ── */
.tab-panel{padding:14px 14px 32px;min-height:100%}
.tab-panel.hidden{display:none}

/* ── Bottom tab bar ── */
.tab-bar{
  display:flex;background:var(--bg2);border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;z-index:20;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px 7px;background:none;border:none;color:var(--txt3);transition:color .2s;
}
.tab-btn.active{color:var(--p1)}
.tab-icon{font-size:21px;line-height:1}
.tab-lbl{font-size:10px;font-weight:700;letter-spacing:.2px;text-transform:uppercase}

/* ═══════════════════════════════════════════════════════════
   THIS WEEK TAB
   ═══════════════════════════════════════════════════════════ */

/* Week scroll strip */
.strip-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:0 -14px 12px;padding:0 14px}
.strip-wrap::-webkit-scrollbar{display:none}
.week-strip{display:flex;gap:6px;width:max-content;padding:2px 0}
.wpill{display:flex;flex-direction:column;align-items:center;gap:3px;width:36px;cursor:pointer;flex-shrink:0}
.wpill-n{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  background:var(--bg3);color:var(--txt2);
  border:1.5px solid transparent;transition:all .2s;
}
.wpill.active .wpill-n{background:var(--p1);color:#fff;box-shadow:0 0 0 3px var(--p1g)}
.wpill.done .wpill-n{border-color:var(--p1);color:var(--p1)}
.wpill.done.active .wpill-n{background:var(--p1);color:#fff}
.wpill.sab .wpill-n{font-size:10px}
.wpill-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.wpill.done .wpill-dot{background:var(--p1)}
.wpill.active .wpill-dot{background:rgba(255,255,255,.5)}

/* Week nav row */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.nav-arr{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--txt1);font-size:24px;font-weight:200;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.nav-arr:active{background:var(--bg4);transform:scale(.9)}
.nav-arr:disabled{opacity:.3;pointer-events:none}
.wk-title-area{flex:1;text-align:center;min-width:0}
.wk-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:2px}
.wk-name{font-size:15px;font-weight:700;color:var(--txt1);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Phase badge */
.phase-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px 4px 7px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px;color:#fff;margin-bottom:12px;
}
.ph-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6)}
.ph1{background:rgba(37,99,235,.75)} .ph2{background:rgba(5,150,105,.75)}
.ph3{background:rgba(217,119,6,.75)} .ph4{background:rgba(109,40,217,.75)}
.ph-sab{background:rgba(100,116,139,.75)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px 11px;border-bottom:1px solid var(--border)}
.card-ico{font-size:15px}
.card-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2)}
.card-body{padding:12px 16px}

/* Memory verse card */
.mem-card{
  background:linear-gradient(135deg,#fde68a,#f59e0b);
  border-radius:16px;padding:16px 18px;margin-bottom:12px;
  cursor:pointer;transition:transform .2s;user-select:none;-webkit-user-select:none;
}
.mem-card:active{transform:scale(.98)}
[data-theme="light"] .mem-card{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.mem-weeks{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(120,53,15,.65);margin-bottom:3px}
.mem-ref{font-size:22px;font-weight:800;color:#78350f}
.mem-ver{font-size:11px;font-weight:600;color:rgba(120,53,15,.5);margin-top:2px}
.mem-hint{font-size:12px;color:rgba(120,53,15,.5);font-style:italic;margin-top:4px}
.mem-text{font-size:14px;line-height:1.65;color:#78350f;font-style:italic;
  padding-top:10px;margin-top:10px;border-top:1px solid rgba(120,53,15,.2);display:none}
.mem-card.revealed .mem-text{display:block}
.mem-card.revealed .mem-hint{display:none}

/* BibleProject */
.bp-link{
  display:flex;align-items:center;gap:10px;padding:9px 0;
  text-decoration:none;color:var(--p1);font-size:14px;font-weight:500;
  border-bottom:1px solid var(--border);transition:opacity .2s;
}
.bp-link:last-child{border-bottom:none;padding-bottom:0}
.bp-link:active{opacity:.6}
.bp-play{
  width:28px;height:28px;border-radius:8px;
  background:var(--p1g);color:var(--p1);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;
}

/* Readings */
.r-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--rdone-bg);
  border:1.5px solid var(--border);border-radius:12px;
  margin-bottom:8px;cursor:pointer;transition:all .2s;
  user-select:none;-webkit-user-select:none;
}
.r-item:active{transform:scale(.98)}
.r-item.done{background:var(--rread-bg);border-color:var(--rread-bdr)}
.r-check{
  width:22px;height:22px;border-radius:7px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;transition:all .2s;color:transparent;
}
.r-item.done .r-check{background:var(--p1);border-color:var(--p1);color:#fff}
.r-lbl{font-size:14px;font-weight:500;color:var(--txt1);flex:1}
.r-item.done .r-lbl{color:var(--rread-txt)}
.mark-btn{
  width:100%;padding:13px;background:var(--p1);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:700;
  transition:all .2s;letter-spacing:.2px;margin-top:4px;
}
.mark-btn:active{transform:scale(.97);filter:brightness(.9)}
.mark-btn.done{background:#16a34a}

/* OBT */
.obt-ta{
  width:100%;min-height:80px;padding:10px 13px;
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;
  color:var(--txt1);font-family:inherit;font-size:14px;line-height:1.55;
  resize:vertical;transition:border-color .2s;
}
.obt-ta:focus{outline:none;border-color:var(--p1)}
.obt-saved{font-size:11px;color:var(--txt3);margin-top:5px;text-align:right}

/* Sabbath hero */
.sab-hero{
  background:linear-gradient(135deg,rgba(74,124,89,.18),rgba(74,124,89,.06));
  border:1px solid rgba(74,124,89,.25);border-radius:16px;
  padding:22px 18px;text-align:center;margin-bottom:14px;
}
.sab-hero.jubilee{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.07));border-color:rgba(251,191,36,.3)}
.sab-emoji{font-size:34px;margin-bottom:8px}
.sab-title{font-size:20px;font-weight:800;margin-bottom:6px}
.sab-sub{font-size:14px;color:var(--txt2);line-height:1.55}

/* Block memory cards */
.blk-mem-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.blk-mc{
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border-radius:12px;padding:12px;cursor:pointer;transition:transform .2s;
}
[data-theme="light"] .blk-mc{background:linear-gradient(135deg,#fde68a,#fbbf24)}
.blk-mc:active{transform:scale(.96)}
.blk-wks{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(120,53,15,.6);margin-bottom:3px}
.blk-ref{font-size:15px;font-weight:800;color:#78350f}
.blk-hint{font-size:10px;color:rgba(120,53,15,.5);font-style:italic;margin-top:3px}
.blk-txt{font-size:12px;font-style:italic;color:#92400e;line-height:1.5;
  padding-top:8px;margin-top:8px;border-top:1px solid rgba(120,53,15,.2);display:none}
.blk-mc.revealed .blk-txt{display:block}
.blk-mc.revealed .blk-hint{display:none}

/* OBT recap */
.obt-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.obt-entry:last-child{border-bottom:none}
.obt-wk{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:3px}
.obt-tx{font-size:14px;font-style:italic;color:var(--txt1);line-height:1.5}
.obt-nil{font-size:13px;color:var(--txt3);font-style:italic}

/* Catchup */
.cu-all{text-align:center;padding:18px;color:#4ade80;font-size:15px;font-weight:700}
.cu-wk{padding:10px 0;border-bottom:1px solid var(--border)}
.cu-wk:last-child{border-bottom:none}
.cu-wkttl{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.cu-chips{display:flex;flex-wrap:wrap;gap:5px}
.cu-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 7px;font-size:12px;color:var(--txt1)}
.cu-ok{color:#4ade80;font-size:12px;font-weight:700}

/* ═══════════════════════════════════════════════════════════
   OVERVIEW TAB
   ═══════════════════════════════════════════════════════════ */
.ov-sec-ttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);margin-bottom:10px;margin-top:4px}
.week-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:20px}
.gtile{
  aspect-ratio:1;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;
  background:var(--bg3);color:var(--txt3);
  border:1.5px solid transparent;cursor:pointer;transition:all .15s;position:relative;
}
.gtile:active{transform:scale(.85)}
.gtile.complete{background:var(--p1);color:#fff}
.gtile.missed{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3)}
.gtile.current{border-color:var(--p1);color:var(--p1);animation:pulseB 2s infinite}
.gtile.sab-tile{font-size:9px}
.gtile.sab-tile::after{content:'';position:absolute;bottom:3px;right:3px;width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}
@keyframes pulseB{0%,100%{box-shadow:0 0 0 0 var(--p1g)}50%{box-shadow:0 0 0 4px var(--p1g)}}

/* Overview week rows */
.ov-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .15s;
}
.ov-row:active{transform:scale(.98);background:var(--bg3)}
.ov-num{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;background:var(--bg3);color:var(--txt2);
}
.ov-row.complete .ov-num{background:var(--p1);color:#fff}
.ov-row.missed .ov-num{background:rgba(239,68,68,.15);color:#f87171}
.ov-row.current .ov-num{border:2px solid var(--p1);color:var(--p1);background:transparent}
.ov-info{flex:1;min-width:0}
.ov-ttl{font-size:14px;font-weight:500;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-meta{font-size:11px;color:var(--txt3);margin-top:1px}
.ov-bdg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0}
.ov-bdg.complete{background:rgba(22,163,74,.15);color:#4ade80}
.ov-bdg.missed{background:rgba(239,68,68,.15);color:#f87171}
.ov-bdg.sab{background:rgba(251,191,36,.12);color:#fbbf24}

/* ═══════════════════════════════════════════════════════════
   PROGRESS TAB
   ═══════════════════════════════════════════════════════════ */
.rings-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 12px}
.rings-svg-box{position:relative;width:240px;height:240px}
.rings-svg-box svg{width:240px;height:240px}
.rings-ctr{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.rings-pct{font-size:34px;font-weight:800;color:var(--txt1);line-height:1}
.rings-lbl{font-size:11px;font-weight:600;color:var(--txt3);margin-top:3px}
.ring-track{fill:none;stroke-width:14;opacity:.18}
.ring-fill{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1.1s ease}

.ring-legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.rl-item{display:flex;align-items:center;gap:6px;font-size:13px}
.rl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rl-lbl{color:var(--txt2)}
.rl-pct{font-weight:800;color:var(--txt1)}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.stat-val{font-size:24px;font-weight:800;color:var(--p1)}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px;font-weight:600}

/* Books */
.bk-item{padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.bk-item:last-child{border-bottom:none}
.bk-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.bk-name{font-size:14px;font-weight:500;color:var(--txt1)}
.bk-pct{font-size:12px;font-weight:700;color:var(--p1)}
.bk-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bk-fill{height:100%;background:var(--p1);border-radius:2px;transition:width .4s}
.ch-view{display:none;margin-top:8px}
.ch-view.open{display:block}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(32px,1fr));gap:5px;margin-top:6px}
.ch-box{
  aspect-ratio:1;border-radius:7px;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;cursor:pointer;
  background:var(--bg3);color:var(--txt2);transition:all .15s;
}
.ch-box:active{transform:scale(.85)}
.ch-box.rd{background:var(--p1);color:#fff;border-color:transparent}
.ch-box.cwk{border-color:var(--p1);color:var(--p1)}
.ch-box.nwk{opacity:.35}
.ch-box.rd.nwk{opacity:.6}

/* ═══════════════════════════════════════════════════════════
   SETTINGS PANEL
   ═══════════════════════════════════════════════════════════ */
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.s-overlay.hidden{display:none}
.s-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--bg2);
  border-radius:22px 22px 0 0;border-top:1px solid var(--border2);
  padding:8px 0 0;padding-bottom:calc(20px + env(safe-area-inset-bottom));
  z-index:101;max-height:88vh;overflow-y:auto;
}
.s-panel.hidden{display:none}
.s-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:0 auto 16px}
.s-title{font-size:18px;font-weight:800;padding:0 20px 12px;border-bottom:1px solid var(--border)}
.s-sec{padding:14px 20px;border-bottom:1px solid var(--border)}
.s-sec:last-child{border-bottom:none}
.s-sec-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:10px}
.s-row{display:flex;justify-content:space-between;align-items:center}
.s-row-lbl{font-size:15px;color:var(--txt1)}

/* Toggle */
.tgl{position:relative;display:inline-block;width:46px;height:26px}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-sl{position:absolute;inset:0;background:var(--bg4);border-radius:13px;cursor:pointer;transition:.3s}
.tgl-sl::before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;left:3px;top:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tgl input:checked+.tgl-sl{background:var(--p1)}
.tgl input:checked+.tgl-sl::before{transform:translateX(20px)}

/* Swatches */
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;padding:6px;border-radius:12px;transition:background .2s}
.sw:active{background:var(--bg3)}
.sw-c{width:40px;height:40px;border-radius:12px;border:2px solid transparent;display:block;transition:all .2s}
.sw.active .sw-c{border-color:var(--txt1);transform:scale(1.12)}
.sw-n{font-size:10px;font-weight:700;color:var(--txt2)}

/* Version chips */
.ver-chips{display:flex;gap:8px}
.ver-chip{
  flex:1;padding:9px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:10px;font-size:14px;font-weight:700;color:var(--txt2);transition:all .2s;
}
.ver-chip.active{background:var(--p1);border-color:var(--p1);color:#fff}

/* Settings buttons */
.s-btns{display:flex;flex-direction:column;gap:8px}
.s-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;transition:all .2s}
.s-btn:active{transform:scale(.97)}
.s-btn.save{background:var(--p1);color:#fff}
.s-btn.imp{background:var(--bg3);border:1px solid var(--border2);color:var(--txt1)}
.s-btn.rst{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}

/* ═══════════════════════════════════════════════════════════
   TOAST + CONFETTI
   ═══════════════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:86px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--bg3);border:1px solid var(--border2);color:var(--txt1);
  padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;
  z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cp{position:absolute;top:-12px;border-radius:2px;animation:cFall 2.8s ease-in forwards}
@keyframes cFall{0%{transform:translateY(0) rotate(0) scaleX(1);opacity:1}50%{opacity:1}100%{transform:translateY(105vh) rotate(900deg) scaleX(-1);opacity:0}}
</style>

/* =========================================================
   STATE
   ========================================================= */
let readChapters={}, currentWeek=1, activeTab='week';
let darkMode=true, palette='sage', bibleVersion='esv';
let completedWeeks={}, completedDates={}, streak=0, longestStreak=0;

const K={
  read:'cccRead3',week:'cccWeek3',dark:'cccDark3',
  palette:'cccPalette3',ver:'cccVer3',
  completed:'cccCompleted3',dates:'cccDates3',
  streak:'cccStreak3',longest:'cccLongest3',
  obt:w=>`cccOBT_${w}`
};

/* =========================================================
   INIT
   ========================================================= */
function init(){
  loadState();
  applyTheme();
  buildWeekStrip();
  renderWeekTab();
  updateStreak();
  // Swipe detection
  let tx=0;
  const ms=document.getElementById('mainScroll');
  ms.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
  ms.addEventListener('touchend',e=>{
    if(activeTab!=='week') return;
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50) changeWeek(dx<0?1:-1);
  },{passive:true});
}

function loadState(){
  try{
    const r=localStorage.getItem(K.read); if(r) readChapters=JSON.parse(r);
    const w=localStorage.getItem(K.week); if(w) currentWeek=parseInt(w)||1;
    const d=localStorage.getItem(K.dark); darkMode= d===null ? true : d==='true';
    const p=localStorage.getItem(K.palette); if(p) palette=p;
    const v=localStorage.getItem(K.ver); if(v) bibleVersion=v;
    const c=localStorage.getItem(K.completed); if(c) completedWeeks=JSON.parse(c);
    const dt=localStorage.getItem(K.dates); if(dt) completedDates=JSON.parse(dt);
    const s=localStorage.getItem(K.streak); if(s) streak=parseInt(s)||0;
    const ls=localStorage.getItem(K.longest); if(ls) longestStreak=parseInt(ls)||0;
  }catch(e){}
}

function saveState(){
  localStorage.setItem(K.read,JSON.stringify(readChapters));
  localStorage.setItem(K.week,currentWeek);
  localStorage.setItem(K.dark,darkMode);
  localStorage.setItem(K.palette,palette);
  localStorage.setItem(K.ver,bibleVersion);
  localStorage.setItem(K.completed,JSON.stringify(completedWeeks));
  localStorage.setItem(K.dates,JSON.stringify(completedDates));
  localStorage.setItem(K.streak,streak);
  localStorage.setItem(K.longest,longestStreak);
}

/* =========================================================
   THEME
   ========================================================= */
function applyTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme',darkMode?'dark':'light');
  html.setAttribute('data-palette',palette);
  document.getElementById('darkToggle').checked=darkMode;
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('active',s.dataset.p===palette));
  ['esv','niv','kjv'].forEach(v=>document.getElementById(`vc-${v}`).classList.toggle('active',v===bibleVersion));
}

function toggleDark(val){
  darkMode=val;
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  saveState();
}

function setPalette(p){
  palette=p;
  document.documentElement.setAttribute('data-palette',p);
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('active',s.dataset.p===p));
  saveState();
  // Refresh rings colour if on progress tab
  if(activeTab==='progress') renderProgressTab();
}

function setVersion(v){
  bibleVersion=v;
  ['esv','niv','kjv'].forEach(x=>document.getElementById(`vc-${x}`).classList.toggle('active',x===v));
  saveState();
  if(activeTab==='week') renderWeekContent();
}

/* =========================================================
   SETTINGS
   ========================================================= */
function openSettings(){
  document.getElementById('sOverlay').classList.remove('hidden');
  document.getElementById('sPanel').classList.remove('hidden');
}
function closeSettings(){
  document.getElementById('sOverlay').classList.add('hidden');
  document.getElementById('sPanel').classList.add('hidden');
}

/* =========================================================
   TAB NAVIGATION
   ========================================================= */
function switchTab(tab){
  activeTab=tab;
  ['week','overview','progress'].forEach(t=>{
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('hidden',t!==tab);
    document.getElementById('tb'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  if(tab==='overview') renderOverviewTab();
  if(tab==='progress') renderProgressTab();
  document.getElementById('mainScroll').scrollTop=0;
}

/* =========================================================
   WEEK STRIP
   ========================================================= */
function buildWeekStrip(){
  const strip=document.getElementById('weekStrip');
  strip.innerHTML='';
  for(let i=1;i<=65;i++){
    const w=P[i];
    const div=document.createElement('div');
    const done=isWeekDone(i);
    div.className='wpill'+(i===currentWeek?' active':'')+(done?' done':'')+(w.isSabbath?' sab':'');
    div.onclick=(()=>{const n=i;return()=>setWeek(n);})();
    div.innerHTML=`<div class="wpill-n">${w.isSabbath?'S'+i:i}</div><div class="wpill-dot"></div>`;
    strip.appendChild(div);
  }
  scrollStripTo(currentWeek);
}

function scrollStripTo(n){
  const strip=document.getElementById('weekStrip');
  const pill=strip.children[n-1];
  if(!pill) return;
  const wrap=strip.parentElement;
  const offset=pill.offsetLeft-(wrap.clientWidth/2)+(pill.clientWidth/2);
  wrap.scrollTo({left:offset,behavior:'smooth'});
}

function updateStrip(){
  const pills=document.getElementById('weekStrip').children;
  for(let i=0;i<65;i++){
    const n=i+1;
    const pill=pills[i];
    if(!pill) continue;
    const done=isWeekDone(n);
    pill.className='wpill'+(n===currentWeek?' active':'')+(done?' done':'')+(P[n].isSabbath?' sab':'');
  }
  scrollStripTo(currentWeek);
}

/* =========================================================
   WEEK NAVIGATION
   ========================================================= */
function changeWeek(dir){
  const n=currentWeek+dir;
  if(n<1||n>65) return;
  setWeek(n);
}

function setWeek(n){
  currentWeek=n;
  saveState();
  renderWeekTab();
  if(activeTab!=='week') switchTab('week');
}

/* =========================================================
   THIS WEEK TAB
   ========================================================= */
function renderWeekTab(){
  const w=P[currentWeek];
  document.getElementById('wkNum').textContent=`Week ${currentWeek} of 65`;
  document.getElementById('wkName').textContent=w.title;
  document.getElementById('prevBtn').disabled=currentWeek<=1;
  document.getElementById('nextBtn').disabled=currentWeek>=65;
  // Phase badge
  const cls=w.isSabbath?'ph-sab':`ph${w.phase}`;
  document.getElementById('phaseBadge').innerHTML=
    `<span class="phase-badge ${cls}"><span class="ph-dot"></span>Phase ${w.phase} · ${w.phaseTitle}</span>`;
  renderWeekContent();
  updateStrip();
}

function renderWeekContent(){
  const w=P[currentWeek];
  const el=document.getElementById('weekContent');
  if(w.isSabbath){
    el.innerHTML=buildSabbathHTML(w);
    el.querySelectorAll('.blk-mc').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('revealed')));
  } else {
    el.innerHTML=buildRegularHTML(w);
    el.querySelector('.mem-card').addEventListener('click',function(){this.classList.toggle('revealed')});
  }
  loadOBT();
}

/* ── Regular week ── */
function buildRegularHTML(w){
  const allDone=isWeekComplete(w);
  return `
    <div class="mem-card" id="memCard">
      <div class="mem-weeks">📜 Memory Verse · Week ${currentWeek}</div>
      <div class="mem-ref">${w.memory.ref}</div>
      <div class="mem-ver">${bibleVersion.toUpperCase()}</div>
      <div class="mem-hint">Tap to reveal verse</div>
      <div class="mem-text">${vt(w.memory.key)}</div>
    </div>
    ${buildBPHTML(w)}
    <div class="card">
      <div class="card-hdr"><span class="card-ico">📖</span><span class="card-ttl">This Week's Readings</span></div>
      <div style="padding:12px 12px 4px" id="readList">${buildReadItems(w)}</div>
      <div style="padding:0 12px 12px">
        <button class="mark-btn${allDone?' done':''}" id="markBtn" onclick="markWeekAsRead()">
          ${allDone?'✓ Week Complete — Tap to Undo':'Mark This Week Complete'}
        </button>
      </div>
    </div>
    ${buildOBTHTML()}`;
}

function buildBPHTML(w){
  if(!w.bp||!w.bp.length) return '';
  return `<div class="card">
    <div class="card-hdr"><span class="card-ico">📺</span><span class="card-ttl">BibleProject Resources</span></div>
    <div class="card-body">${w.bp.map(b=>`<a class="bp-link" href="${b.u}" target="_blank" rel="noopener"><span class="bp-play">▶</span>${b.l}</a>`).join('')}</div>
  </div>`;
}

function buildReadItems(w){
  return w.readings.map((r,i)=>{
    const done=isReadingComplete(r);
    const lbl=r.label||autoLabel(r);
    return `<div class="r-item${done?' done':''}" onclick="toggleReading(${i})">
      <div class="r-check">${done?'✓':''}</div>
      <div class="r-lbl">${lbl}</div>
    </div>`;
  }).join('');
}

function buildOBTHTML(){
  return `<div class="card">
    <div class="card-hdr"><span class="card-ico">✏️</span><span class="card-ttl">One Big Thing</span></div>
    <div class="card-body">
      <textarea class="obt-ta" id="obtTA" placeholder="What was one big thing from your readings this week?"></textarea>
      <div class="obt-saved" id="obtSaved"></div>
    </div>
  </div>`;
}

/* ── Sabbath week ── */
function buildSabbathHTML(w){
  const jub=w.isJubilee;
  return `
    <div class="sab-hero${jub?' jubilee':''}">
      <div class="sab-emoji">${jub?'🎉':'🌿'}</div>
      <div class="sab-title">${jub?'Sabbath & Jubilee!':'Sabbath Week'}</div>
      <div class="sab-sub">${jub
        ?"A double rest — the halfway Jubilee! Catch up on any readings, celebrate how far you've come, and press on."
        :"A week to rest, catch up on any missed readings, review what God has been teaching you, and breathe."
      }</div>
    </div>
    ${buildCatchupHTML(w.block)}
    ${buildBlockMemHTML(w.block)}
    ${buildBlockOBTHTML(w.block)}
    ${buildOBTHTML()}`;
}

function buildCatchupHTML(block){
  let anyUnread=false, rows='';
  block.forEach(wk=>{
    const wd=P[wk], unread=[];
    wd.readings.forEach(r=>r.ch.forEach(c=>{if(!isChapterRead(r.book,c)) unread.push({book:r.book,ch:c})}));
    if(unread.length){
      anyUnread=true;
      const byBook={};
      unread.forEach(u=>{if(!byBook[u.book])byBook[u.book]=[];byBook[u.book].push(u.ch)});
      rows+=`<div class="cu-wk"><div class="cu-wkttl">Week ${wk} — ${wd.title}</div><div class="cu-chips">${
        Object.entries(byBook).map(([b,chs])=>`<span class="cu-chip">${b} ${chs.sort((a,c)=>a-c).join(', ')}</span>`).join('')
      }</div></div>`;
    } else {
      rows+=`<div class="cu-wk"><div class="cu-wkttl">Week ${wk} — ${wd.title}</div><div class="cu-ok">✓ Complete</div></div>`;
    }
  });
  const inner=anyUnread?rows:`<div class="cu-all">🎉 You're all caught up — nothing to catch up on!</div>`;
  return `<div class="card"><div class="card-hdr"><span class="card-ico">📋</span><span class="card-ttl">Catch-up — This Block</span></div><div class="card-body" style="padding:8px 16px">${inner}</div></div>`;
}

function buildBlockMemHTML(block){
  // Consolidate pairs: group consecutive weeks that share the same verse key
  const pairs=[];
  let i=0;
  while(i<block.length){
    const wk=block[i];
    const key=P[wk].memory.key;
    if(i+1<block.length && P[block[i+1]].memory.key===key){
      pairs.push({weeks:[wk,block[i+1]],key,ref:P[wk].memory.ref});
      i+=2;
    } else {
      pairs.push({weeks:[wk],key,ref:P[wk].memory.ref});
      i++;
    }
  }
  const cards=pairs.map(p=>{
    const wkLabel=p.weeks.length===2?`Week ${p.weeks[0]} & ${p.weeks[1]}`:`Week ${p.weeks[0]}`;
    return `<div class="blk-mc">
      <div class="blk-wks">${wkLabel}</div>
      <div class="blk-ref">${p.ref}</div>
      <div class="blk-hint">Tap to reveal</div>
      <div class="blk-txt">${vt(p.key)}</div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-hdr"><span class="card-ico">📜</span><span class="card-ttl">Memory Verses · This Block</span></div><div class="card-body"><div class="blk-mem-grid">${cards}</div></div></div>`;
}

function buildBlockOBTHTML(block){
  const rows=block.map(wk=>{
    const saved=localStorage.getItem(K.obt(wk))||'';
    return `<div class="obt-entry">
      <div class="obt-wk">Week ${wk} — ${P[wk].title}</div>
      ${saved?`<div class="obt-tx">"${saved}"</div>`:`<div class="obt-nil">Nothing recorded for this week.</div>`}
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-hdr"><span class="card-ico">✏️</span><span class="card-ttl">Your Reflections · This Block</span></div><div class="card-body" style="padding:4px 16px 8px">${rows}</div></div>`;
}

/* =========================================================
   OBT
   ========================================================= */
function loadOBT(){
  const ta=document.getElementById('obtTA');
  if(!ta) return;
  const saved=localStorage.getItem(K.obt(currentWeek))||'';
  ta.value=saved;
  document.getElementById('obtSaved').textContent=saved?'Saved ✓':'';
  ta.oninput=function(){
    localStorage.setItem(K.obt(currentWeek),this.value);
    document.getElementById('obtSaved').textContent=this.value?'Saved ✓':'';
  };
}

/* =========================================================
   READING LOGIC
   ========================================================= */
function autoLabel(r){
  if(r.ch.length===1) return `${r.book} ${r.ch[0]}`;
  return `${r.book} ${r.ch[0]}–${r.ch[r.ch.length-1]}`;
}

function isChapterRead(book,ch){
  return !!(readChapters[book]&&readChapters[book].includes(ch));
}

function isReadingComplete(r){
  return r.ch.every(c=>isChapterRead(r.book,c));
}

function isWeekComplete(w){
  if(w.isSabbath) return true;
  return w.readings.every(r=>isReadingComplete(r));
}

function isWeekDone(n){
  const w=P[n];
  if(w.isSabbath) return completedWeeks[n]||false;
  return isWeekComplete(w);
}

function isChapterInCurrentWeek(book,ch){
  const w=P[currentWeek];
  if(w.isSabbath) return false;
  return w.readings.some(r=>r.book===book&&r.ch.includes(ch));
}

function markChapterRead(book,ch,isRead){
  if(!readChapters[book]) readChapters[book]=[];
  if(isRead&&!readChapters[book].includes(ch)) readChapters[book].push(ch);
  else if(!isRead) readChapters[book]=readChapters[book].filter(x=>x!==ch);
}

function toggleReading(idx){
  const w=P[currentWeek];
  const r=w.readings[idx];
  const wasDone=isReadingComplete(r);
  r.ch.forEach(c=>markChapterRead(r.book,c,!wasDone));
  saveState();
  // Re-render reading list
  document.getElementById('readList').innerHTML=buildReadItems(w);
  // Re-attach onclick
  document.querySelectorAll('#readList .r-item').forEach((el,i)=>el.onclick=()=>toggleReading(i));
  updateMarkBtn(w);
  if(activeTab==='progress') renderProgressTab();
}

function updateMarkBtn(w){
  const btn=document.getElementById('markBtn');
  if(!btn) return;
  const done=isWeekComplete(w);
  btn.className='mark-btn'+(done?' done':'');
  btn.textContent=done?'✓ Week Complete — Tap to Undo':'Mark This Week Complete';
}

function markWeekAsRead(){
  const w=P[currentWeek];
  if(w.isSabbath){
    completedWeeks[currentWeek]=!completedWeeks[currentWeek];
    saveState();
    updateStrip();
    return;
  }
  const wasDone=isWeekComplete(w);
  w.readings.forEach(r=>r.ch.forEach(c=>markChapterRead(r.book,c,!wasDone)));
  if(!wasDone){
    completedWeeks[currentWeek]=true;
    completedDates[currentWeek]=new Date().toISOString();
    launchConfetti();
    showToast('🎉 Week '+currentWeek+' complete!');
  } else {
    completedWeeks[currentWeek]=false;
    delete completedDates[currentWeek];
  }
  saveState();
  computeStreak();
  updateStreak();
  updateMarkBtn(w);
  document.getElementById('readList').innerHTML=buildReadItems(w);
  document.querySelectorAll('#readList .r-item').forEach((el,i)=>el.onclick=()=>toggleReading(i));
  updateStrip();
  if(activeTab==='progress') renderProgressTab();
}

/* =========================================================
   OVERVIEW TAB
   ========================================================= */
function renderOverviewTab(){
  const el=document.getElementById('overviewContent');
  // Grid
  let grid='<div class="ov-sec-ttl">All 65 Weeks</div><div class="week-grid">';
  for(let i=1;i<=65;i++){
    const st=getWeekStatus(i);
    const w=P[i];
    const cls='gtile'+
      (st==='complete'?' complete':'')+(st==='missed'?' missed':'')+(st==='current'?' current':'')+
      (w.isSabbath?' sab-tile':'');
    grid+=`<div class="${cls}" onclick="goToWeek(${i})" title="Week ${i}: ${w.title}">${w.isSabbath?'☽':i}</div>`;
  }
  grid+='</div>';
  // Legend
  grid+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;font-size:12px">
    <span style="color:var(--p1)">■ Complete</span>
    <span style="color:#f87171">■ Missed</span>
    <span style="color:var(--txt3)">■ Upcoming</span>
  </div>`;
  // Week list
  grid+='<div class="ov-sec-ttl">Week List</div>';
  for(let i=1;i<=65;i++){
    const st=getWeekStatus(i);
    const w=P[i];
    const dateStr=completedDates[i]?new Date(completedDates[i]).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
    const badge=st==='complete'
      ?`<span class="ov-bdg complete">✓ Done</span>`
      :st==='missed'
      ?`<span class="ov-bdg missed">Missed</span>`
      :w.isSabbath
      ?`<span class="ov-bdg sab">🌿 Sabbath</span>`:'';
    grid+=`<div class="ov-row${st==='complete'?' complete':st==='missed'?' missed':st==='current'?' current':''}" onclick="goToWeek(${i})">
      <div class="ov-num">${w.isSabbath?'☽':i}</div>
      <div class="ov-info">
        <div class="ov-ttl">${w.title}</div>
        <div class="ov-meta">${dateStr||('Phase '+w.phase+' · '+w.phaseTitle)}</div>
      </div>
      ${badge}
    </div>`;
  }
  el.innerHTML=grid;
}

function getWeekStatus(n){
  if(n===currentWeek) return 'current';
  if(n>currentWeek) return 'future';
  const w=P[n];
  if(w.isSabbath) return completedWeeks[n]?'complete':'future';
  return isWeekComplete(w)?'complete':'missed';
}

function goToWeek(n){
  setWeek(n);
}

/* =========================================================
   PROGRESS TAB
   ========================================================= */
function renderProgressTab(){
  const prog=computeProgress();
  const el=document.getElementById('progressContent');
  // Rings
  const r1=100,r2=78,r3=56;
  const c1=(2*Math.PI*r1).toFixed(2);
  const c2=(2*Math.PI*r2).toFixed(2);
  const c3=(2*Math.PI*r3).toFixed(2);
  const biblePct=prog.bible.pct, otPct=prog.ot.pct, ntPct=prog.nt.pct;

  el.innerHTML=`
    <div class="rings-wrap">
      <div class="rings-svg-box">
        <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="120" cy="120" r="${r1}" stroke="var(--p1)"/>
          <circle class="ring-track" cx="120" cy="120" r="${r2}" stroke="var(--p2)"/>
          <circle class="ring-track" cx="120" cy="120" r="${r3}" stroke="var(--p3)"/>
          <circle id="rBible" class="ring-fill" cx="120" cy="120" r="${r1}" stroke="var(--p1)"
            stroke-dasharray="${c1}" stroke-dashoffset="${c1}" transform="rotate(-90 120 120)"/>
          <circle id="rOT" class="ring-fill" cx="120" cy="120" r="${r2}" stroke="var(--p2)"
            stroke-dasharray="${c2}" stroke-dashoffset="${c2}" transform="rotate(-90 120 120)"/>
          <circle id="rNT" class="ring-fill" cx="120" cy="120" r="${r3}" stroke="var(--p3)"
            stroke-dasharray="${c3}" stroke-dashoffset="${c3}" transform="rotate(-90 120 120)"/>
        </svg>
        <div class="rings-ctr">
          <div class="rings-pct">${(biblePct*100).toFixed(1)}%</div>
          <div class="rings-lbl">of the Bible</div>
        </div>
      </div>
      <div class="ring-legend">
        <div class="rl-item"><div class="rl-dot" style="background:var(--p1)"></div><span class="rl-lbl">Holy Bible</span>&nbsp;<span class="rl-pct">${(biblePct*100).toFixed(1)}%</span></div>
        <div class="rl-item"><div class="rl-dot" style="background:var(--p2)"></div><span class="rl-lbl">Old Testament</span>&nbsp;<span class="rl-pct">${(otPct*100).toFixed(1)}%</span></div>
        <div class="rl-item"><div class="rl-dot" style="background:var(--p3)"></div><span class="rl-lbl">New Testament</span>&nbsp;<span class="rl-pct">${(ntPct*100).toFixed(1)}%</span></div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${prog.bible.read}</div><div class="stat-lbl">Chapters Read</div></div>
      <div class="stat-box"><div class="stat-val">${prog.booksComplete}</div><div class="stat-lbl">Books Done</div></div>
      <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">Week Streak</div></div>
    </div>
    <div class="card">
      <div class="card-hdr"><span class="card-ico">📚</span><span class="card-ttl">Books of the Bible</span></div>
      <div class="card-body" id="booksContainer"></div>
    </div>`;

  // Animate rings after render
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const tgt1=(c1*(1-biblePct)).toFixed(2);
    const tgt2=(c2*(1-otPct)).toFixed(2);
    const tgt3=(c3*(1-ntPct)).toFixed(2);
    document.getElementById('rBible').style.strokeDashoffset=tgt1;
    document.getElementById('rOT').style.strokeDashoffset=tgt2;
    document.getElementById('rNT').style.strokeDashoffset=tgt3;
  }));

  renderBooks();
}

function computeProgress(){
  let bibleRead=0, bibleTotal=0, otRead=0, otTotal=0, ntRead=0, ntTotal=0, booksComplete=0;
  Object.entries(BD).forEach(([book,total])=>{
    const read=readChapters[book]?readChapters[book].length:0;
    bibleTotal+=total; bibleRead+=read;
    if(OT_BOOKS.has(book)){otTotal+=total;otRead+=read;}
    else{ntTotal+=total;ntRead+=read;}
    if(read===total) booksComplete++;
  });
  return{
    bible:{read:bibleRead,total:bibleTotal,pct:bibleTotal?bibleRead/bibleTotal:0},
    ot:{read:otRead,total:otTotal,pct:otTotal?otRead/otTotal:0},
    nt:{read:ntRead,total:ntTotal,pct:ntTotal?ntRead/ntTotal:0},
    booksComplete
  };
}

/* =========================================================
   BOOKS GRID
   ========================================================= */
function renderBooks(){
  const container=document.getElementById('booksContainer');
  if(!container) return;
  container.innerHTML='';
  Object.keys(BD).forEach(book=>{
    const total=BD[book];
    const read=readChapters[book]?readChapters[book].length:0;
    const pct=read/total*100;
    const div=document.createElement('div');
    div.className='bk-item';
    div.innerHTML=`
      <div class="bk-row" onclick="toggleBook('${book}')">
        <span class="bk-name">${book}</span><span class="bk-pct">${read}/${total}</span>
      </div>
      <div class="bk-track"><div class="bk-fill" style="width:${pct}%"></div></div>
      <div class="ch-view" id="chv-${book}"><div class="ch-grid" id="chg-${book}"></div></div>`;
    container.appendChild(div);
  });
}

function toggleBook(book){
  const v=document.getElementById(`chv-${book}`);
  if(!v) return;
  if(v.classList.contains('open')){v.classList.remove('open');}
  else{v.classList.add('open');renderChapters(book);}
}

function renderChapters(book){
  const grid=document.getElementById(`chg-${book}`);
  if(!grid) return;
  grid.innerHTML='';
  for(let i=1;i<=BD[book];i++){
    const box=document.createElement('div');
    const rd=isChapterRead(book,i);
    const cwk=isChapterInCurrentWeek(book,i);
    box.className='ch-box'+(rd?' rd':'')+(cwk?' cwk':(!rd?' nwk':''));
    box.textContent=i;
    box.onclick=()=>{
      const was=isChapterRead(book,i);
      markChapterRead(book,i,!was);
      saveState();
      box.classList.toggle('rd',!was);
      // Refresh fill bar
      const total=BD[book];
      const read=readChapters[book]?readChapters[book].length:0;
      const fill=document.querySelector(`#chv-${book}`).previousElementSibling.querySelector('.bk-fill');
      if(fill) fill.style.width=(read/total*100)+'%';
      const pctEl=document.querySelector(`#chv-${book}`).previousElementSibling.previousElementSibling.querySelector('.bk-pct');
      if(pctEl) pctEl.textContent=`${read}/${total}`;
      if(activeTab==='week'){const w=P[currentWeek];if(!w.isSabbath)updateMarkBtn(w);}
    };
    grid.appendChild(box);
  }
}

/* =========================================================
   STREAK
   ========================================================= */
function computeStreak(){
  let cur=0, best=longestStreak;
  // Count consecutive completed regular weeks from week 1 upward
  // streak = consecutive completed non-sabbath weeks, sabbath skipped
  let consecutive=0;
  for(let i=1;i<=65;i++){
    const w=P[i];
    if(w.isSabbath) continue;
    if(isWeekComplete(w)){
      consecutive++;
      if(consecutive>best) best=consecutive;
    } else {
      consecutive=0;
    }
  }
  // Current streak: count backwards from current position
  let cs=0;
  for(let i=Math.min(currentWeek,65);i>=1;i--){
    const w=P[i];
    if(w.isSabbath) continue;
    if(isWeekComplete(w)) cs++;
    else break;
  }
  streak=cs; longestStreak=best;
  saveState();
}

function updateStreak(){
  computeStreak();
  const el=document.getElementById('streakDisplay');
  if(streak>0) el.textContent=`🔥 ${streak} week${streak!==1?'s':''}`;
  else el.textContent='📖 Week '+currentWeek;
}

/* =========================================================
   CONFETTI + TOAST
   ========================================================= */
function launchConfetti(){
  const cols=['#4a7c59','#6aab79','#fbbf24','#f59e0b','#3b82f6','#a78bfa','#ec4899','#f87171'];
  const box=document.getElementById('confBox');
  box.innerHTML='';
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='cp';
    const sz=Math.random()*10+5;
    p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*.7}s;animation-duration:${Math.random()*1.5+2.2}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    box.appendChild(p);
  }
  setTimeout(()=>box.innerHTML='',3800);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* =========================================================
   SAVE / IMPORT / RESET
   ========================================================= */
function getAllOBTs(){
  const notes={};
  for(let i=1;i<=65;i++){const v=localStorage.getItem(K.obt(i));if(v)notes[i]=v;}
  return notes;
}

function saveFile(){
  closeSettings();
  const data={
    version:3,appName:"CCC Bible Tracker",savedAt:new Date().toISOString(),
    currentWeek,darkMode,palette,bibleVersion,
    readChapters,completedWeeks,completedDates,streak,longestStreak,
    weekNotes:getAllOBTs()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='CCC_Progress.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Progress saved!');
}

function importFile(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.readChapters){showToast('❌ Not a valid CCC progress file.');return;}
      readChapters=data.readChapters||{};
      currentWeek=data.currentWeek||1;
      darkMode=data.darkMode!==undefined?data.darkMode:true;
      palette=data.palette||'sage';
      bibleVersion=data.bibleVersion||'esv';
      completedWeeks=data.completedWeeks||{};
      completedDates=data.completedDates||{};
      streak=data.streak||0; longestStreak=data.longestStreak||0;
      if(data.weekNotes) Object.entries(data.weekNotes).forEach(([k,v])=>localStorage.setItem(K.obt(k),v));
      saveState(); applyTheme();
      buildWeekStrip(); renderWeekTab(); updateStreak();
      closeSettings();
      showToast('✅ Progress imported!');
    }catch(err){showToast('❌ Error reading file.');}
  };
  reader.readAsText(file);
  event.target.value='';
}

function confirmReset(){
  if(!confirm('Reset ALL progress, notes, and saved data? This cannot be undone.')) return;
  resetProgress();
}

function resetProgress(){
  readChapters={}; currentWeek=1; completedWeeks={}; completedDates={};
  streak=0; longestStreak=0;
  for(let i=1;i<=65;i++) localStorage.removeItem(K.obt(i));
  saveState(); applyTheme();
  buildWeekStrip(); renderWeekTab(); updateStreak();
  closeSettings();
  showToast('Progress reset.');
}

/* =========================================================
   START
   ========================================================= */
window.onload=init;

    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Registered, scope:', reg.scope))
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
